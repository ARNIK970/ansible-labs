---
- name: Настройка параметров безопасности
  hosts: 10.0.47.102
  become: yes
  gather_facts: yes
  tasks:
    # 1. UMASK в /etc/login.defs
    - name: Проверить текущее значение UMASK
      lineinfile:
        path: /etc/login.defs
        regexp: '^UMASK'
        state: absent
      check_mode: yes
      register: umask_check
      changed_when: false

    - name: Установить UMASK 027
      lineinfile:
        path: /etc/login.defs
        regexp: '^#?UMASK'
        line: 'UMASK 027'
        state: present

    # 2. Создать /etc/profile.d/orgnm.sh
    - name: Создать скрипт orgnm.sh
      copy:
        dest: /etc/profile.d/orgnm.sh
        content: |
          # Установка umask 027
          umask 027
        mode: '0644'
        owner: root
        group: root

    # 3. DIR_MODE в /etc/adduser.conf
    - name: Установить DIR_MODE 0700
      lineinfile:
        path: /etc/adduser.conf
        regexp: '^#?DIR_MODE='
        line: 'DIR_MODE=0700'
        state: present

    # 4. Права на /var/log
    - name: Применить права на файлы и директории /var/log
      shell: |
        find /var/log -type f -exec chmod g-wx,o-rwx "{}" + -o -type d -exec chmod g-w,o-rwx "{}" +
      changed_when: false