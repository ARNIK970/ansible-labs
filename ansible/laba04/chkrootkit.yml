---
- name: Установка и запуск chkrootkit
  hosts: 10.0.47.102
  become: yes
  gather_facts: yes
  tasks:
    - name: Установить chkrootkit
      apt:
        name: chkrootkit
        state: present
        update_cache: yes

    - name: Запустить проверку chkrootkit
      command: chkrootkit
      register: chkrootkit_result
      changed_when: false

    - name: Вывести результат проверки
      debug:
        var: chkrootkit_result.stdout_lines