---
- name: Gather system information
  hosts: 10.0.47.102
  gather_facts: yes
  vars:
    target_host: "10.0.47.102"
    target_name: "target2"
    current_datetime: "{{ ansible_date_time.date }} {{ ansible_date_time.time }}"
    os_version: "{{ ansible_distribution }} {{ ansible_distribution_version }} ({{ ansible_distribution_release }})"
    uptime_seconds: "{{ ansible_uptime_seconds }}"
    uptime_days: "{{ (uptime_seconds // 86400) | int }}"
    uptime_hours: "{{ ((uptime_seconds % 86400) // 3600) | int }}"
    uptime_minutes: "{{ ((uptime_seconds % 3600) // 60) | int }}"
    uptime_string: "{{ uptime_days }} дней {{ uptime_hours }} часов {{ uptime_minutes }} минут"
  tasks:
    - name: Display formatted information
      ansible.builtin.debug:
        msg:
          - "Информация о ПК"
          - "─────────────────────────────── "
          - "Хост:         {{ target_name }}"
          - "FDQN:         {{ ansible_fqdn }}"
          - "Версия:       2.8.1 "
          - "Конфиг:       /etc/ansible/config.yml "
          - "Дата/время:   {{ current_datetime }}"
          - "Пользователь: {{ ansible_user_id }}"
          - "Версия ОС:    {{ os_version }}"
          - "Семейство ОС: {{ ansible_os_family }}"
          - "RAM:          {{ ansible_memtotal_mb }}"
          - "ip адрес:     {{ ansible_all_ipv4_addresses }}"
          - "Время работы: {{ uptime_string }}"
          - "─────────────────────────────── "